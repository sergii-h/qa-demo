version: '3.7'

services:
  qa-demo-service:
    container_name: qa-demo-service
    build:
      context: ../
      dockerfile: docker/Dockerfile-demo-service
    ports:
      - "8080:8080"

  qa-demo-interface:
    platform: linux/amd64
    container_name: qa-demo-interface
    build:
      args:
        BE_API_ARG: http://host.docker.internal:8080/v1
      context: ../
      dockerfile: docker/Dockerfile-demo-interface
    ports:
      - "3000:3000"

