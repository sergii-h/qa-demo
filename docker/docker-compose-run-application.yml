services:
  qa-demo-service:
    container_name: qa-demo-service
    depends_on:
      - qa-demo-mongo
      - qa-demo-kafka
    build:
      args:
        MONGODB_URL_ARG: mongodb://host.docker.internal:27018/demo_db
      context: ../
      dockerfile: docker/Dockerfile-demo-service
    ports:
      - "8080:8080"

  qa-demo-interface:
    container_name: qa-demo-interface
    build:
      context: ../
      dockerfile: docker/Dockerfile-demo-interface
    ports:
      - "3000:3000"

  qa-demo-mongo:
    image: mongo:4.4
    container_name: qa-demo-mongo
    expose:
      - 27018
    ports:
      - "27018:27017"
    command: [ "--replSet", "rs0", "--bind_ip_all", "--setParameter", "enableTestCommands=1" ]
    healthcheck:
      test: test $$(echo "rs.initiate().ok || rs.status().ok" | mongo --quiet) -eq 1
      interval: 60s
      start_period: 60s
    volumes:
      - mongo-volume:/data/db
      - ./scripts:/docker-entrypoint-initdb.d/

  qa-demo-kafka:
    image: docker.io/dougdonohoe/kafka-zookeeper:2.6.0
    container_name: qa-demo-kafka
    ports:
      - "2181:2181"
      - "9092:9092"
    environment:
      ADVERTISED_HOST: 127.0.0.1
      NUM_PARTITIONS: 10

volumes:
  mongo-volume:
