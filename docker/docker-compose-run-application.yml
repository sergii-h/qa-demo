networks:
  qa-demo-network:
    external: true

services:
  qa-demo-service:
    container_name: qa-demo-service
    depends_on:
      - qa-demo-mongo
    networks:
      - qa-demo-network
    build:
      args:
        MONGODB_URL_ARG: mongodb://host.docker.internal:27018/demo_db
      context: ../
      dockerfile: docker/Dockerfile-demo-service
    ports:
      - "8080:8080"

  qa-demo-interface:
    container_name: qa-demo-interface
    networks:
      - qa-demo-network
    build:
      args:
        BE_API_ARG: http://qa-demo-service:8080/v1
      context: ../
      dockerfile: docker/Dockerfile-demo-interface
    ports:
      - "3000:3000"
  
