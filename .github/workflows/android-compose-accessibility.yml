name: Run accessibility tests (Android Compose — mocked BE)

on:
  workflow_call:

jobs:
  run-tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Start E2E environment
        uses: ./.github/actions/start-e2e-env
        with:
          app-mode: wiremock

      - name: Run Android Compose accessibility tests
        uses: ./.github/actions/run-android-emulator-tests
        with:
          gradle-args: >-
            -Papi.base.url=http://10.0.2.2:8085/v1/
            -Pandroid.testInstrumentationRunnerArguments.annotation=com.example.demo.e2e.test.base.Accessibility

      - name: Upload allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-android-accessibility
          path: demo-android/app/build/allure-results
          retention-days: 7
          if-no-files-found: warn
