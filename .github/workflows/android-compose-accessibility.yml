name: Run accessibility tests (Android Compose — mocked BE)

on:
  workflow_call:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Create shared Docker network
        run: docker network create qa-demo-e2e || true

      - name: Start WireMock
        run: docker compose -f docker/docker-compose/run-application.yml up -d qa-demo-wiremock

      - name: Wait for WireMock
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8085/__admin/mappings && exit 0
            echo "Waiting for WireMock... ($i/30)"
            sleep 2
          done
          echo "WireMock did not become ready in time"
          exit 1

      - name: Run Android Compose accessibility tests
        uses: ./.github/actions/run-android-emulator-tests
        with:
          gradle-args: >-
            -Papi.base.url=http://10.0.2.2:8085/v1/
            -Pandroid.testInstrumentationRunnerArguments.annotation=com.example.demo.e2e.test.base.Accessibility

      - name: Upload allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-android-accessibility
          path: demo-android/app/build/allure-results
          retention-days: 7
          if-no-files-found: warn
