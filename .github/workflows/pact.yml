name: Run pact tests

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  pact:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Start Pact Broker
        run: docker compose -f docker/docker-compose/run-pact-broker.yml up -d

      - name: Wait for Pact Broker to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:9292 && break
            echo "Waiting for broker... ($i)"
            sleep 2
          done

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: demo-interface/package-lock.json

      - name: Configure Pact Broker main branches
        run: bash .github/scripts/pact-configure-broker.sh

      - name: Bootstrap master branch contracts in Pact Broker
        if: github.ref_name != 'master'
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: bash .github/scripts/pact-bootstrap-master.sh

      - name: Run notification-service consumer pact tests
        working-directory: notification-service
        run: mvn test

      - name: Publish notification-service pacts to broker
        working-directory: notification-service
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_CONSUMER_VERSION: ${{ github.sha }}
          PACT_BRANCH: ${{ github.ref_name }}
        run: |
          docker run --rm --network=host \
            -v "$PWD/target/pacts:/pacts" \
            -e PACT_BROKER_BASE_URL=${PACT_BROKER_BASE_URL} \
            pactfoundation/pact-cli:latest \
            pact-broker publish /pacts \
            --consumer-app-version ${PACT_CONSUMER_VERSION} \
            --branch ${PACT_BRANCH}

      - name: Install FE dependencies
        working-directory: demo-interface
        run: npm ci

      - name: Run consumer pact tests
        working-directory: demo-interface
        run: npm run test:pact

      - name: Publish pacts to broker
        working-directory: demo-interface
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_CONSUMER_VERSION: ${{ github.sha }}
          PACT_BRANCH: ${{ github.ref_name }}
        run: npm run pact:publish

      - name: Run provider pact verification
        working-directory: demo-service
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          PACT_BROKER_BASE_URL: http://localhost:9292
        run: mvn verify -Pintegration-tests -Dit.test="*PactProviderTest" -Djacoco.skip=true -Dpact.verifier.publishResults=true -Dpact.provider.version=${{ github.sha }} -Dpact.provider.branch=${{ github.ref_name }} -Djunit.parallel.enabled=false

      - name: Can I merge to master
        if: github.ref_name != 'master'
        env:
          PACT_VERSION: ${{ github.sha }}
        run: bash .github/scripts/pact-can-i-merge.sh
