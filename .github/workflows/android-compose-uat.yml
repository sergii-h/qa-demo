name: Run UAT tests (Android Compose — full app)

on:
  workflow_call:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Start E2E environment
        uses: ./.github/actions/start-e2e-env
        with:
          app-mode: full
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-35 build-tools;35.0.0

      - name: Run Android Compose UAT smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: |
            cd demo-android && ./gradlew connectedDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.annotation=com.example.demo.e2e.test.base.Uat

      - name: Upload allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-android-uat
          path: demo-android/app/build/allure-results
          retention-days: 7
          if-no-files-found: warn
