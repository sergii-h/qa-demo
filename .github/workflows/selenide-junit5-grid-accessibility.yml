name: Run accessibility tests (Selenide — mocked BE)

on:
  workflow_call:

jobs:
  run-tests:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Start E2E environment
        uses: ./.github/actions/start-e2e-env
        with:
          app-mode: frontend
          start-selenium-grid: 'true'
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Run Selenide accessibility tests
        uses: ./.github/actions/selenide-test
        with:
          maven-profile: accessibility
          test-label: Run Selenide accessibility tests (mocked BE)
          artifact-name: allure-results-selenide-accessibility
