name: Run backend tests

on:
  push:
    branches:
    - '**'

jobs:
  run-tests:
    runs-on: ubuntu-20.04
    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27018:27017
      kafka:
        image: johnnypark/kafka-zookeeper:2.8.2
        env:
          ADVERTISED_HOST: 127.0.0.1
          NUM_PARTITIONS: 10
        ports:
          - "2181:2181"
          - "9092:9092"
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: adopt
        cache: maven
    - name: debug
      run: docker ps -a
#    - name: Build BE (with test-run)
#      run: mvn -B package --file demo-service/pom.xml
