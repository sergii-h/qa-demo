name: Run backend tests

on:
  push:
    branches:
    - '**'

jobs:
  run-tests:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: adopt
        cache: maven
      env:
        MONGODB_URL: mongodb://localhost:27018/demo_db
        KAFKA_SERVER: localhost:9094
    - name: Build BE (with test-run)
      run: mvn -B package --file demo-service/pom.xml
