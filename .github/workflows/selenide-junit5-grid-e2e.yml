name: Run e2e tests (Selenide — mocked BE)

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  run-tests:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Start E2E environment
        uses: ./.github/actions/start-e2e-env
        with:
          app-mode: frontend
          start-selenium-grid: 'true'
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Run Selenide e2e tests
        uses: ./.github/actions/selenide-test
        with:
          maven-profile: e2e
          test-label: Run Selenide e2e tests (mocked BE)
          artifact-name: allure-results-selenide-e2e

  publish-allure:
    needs: run-tests
    if: always() && needs.run-tests.result != 'cancelled' && needs.run-tests.result != 'skipped'
    runs-on: ubuntu-22.04

    concurrency:
      group: ${{ github.workflow }}-publish
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Download allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-selenide-e2e
          path: e2e/selenide-junit5-selenium-grid/target/allure-results

      - name: Publish Allure report to GitHub Pages
        uses: ./.github/actions/publish-selenide-allure
        with:
          working-directory: e2e/selenide-junit5-selenium-grid
          destination-dir: selenide-e2e
          report-title: Run Selenide e2e tests (mocked BE)
