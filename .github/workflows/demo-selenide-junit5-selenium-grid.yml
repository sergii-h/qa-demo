name: Run e2e tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  run-tests:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: temurin
        cache: maven

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Create shared Docker network
      run: docker network create qa-demo-e2e

    - name: Start application
      run: docker compose -f docker/docker-compose/run-application.yml up -d --build

    - name: Wait for application to be ready
      run: |
        for i in {1..30}; do
          curl -sf http://localhost:8080/actuator/health && break
          echo "Waiting for application... ($i)"
          sleep 3
        done

    - name: Start Selenium Grid
      run: docker compose -f docker/docker-compose/run-selenium-grid.yml up -d

    - name: Run e2e tests
      working-directory: e2e/selenide-junit5-selenium-grid
      run: mvn -Dtest.env=remote test

    - name: Upload allure results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: e2e/selenide-junit5-selenium-grid/target/allure-results

    - name: Push allure report
      if: ${{ github.ref == 'refs/heads/master' && !cancelled() }}
      uses: cpina/github-action-push-to-another-repository@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
      with:
        source-directory: 'e2e/selenide-junit5-selenium-grid/target/allure-results'
        destination-github-username: 'sgoldys'
        destination-repository-name: 'github-pages-allure-selenide'
        user-email: 32680292+sgoldys@users.noreply.github.com
        target-branch: gh-pages
        target-directory: allure-results

    - name: Publish allure report
      if: ${{ github.ref == 'refs/heads/master' && !cancelled() }}
      run: gh workflow run allure-report.yml --ref master --repo sgoldys/github-pages-allure-selenide
      env:
        GH_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
