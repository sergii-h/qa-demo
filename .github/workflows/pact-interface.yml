name: Run demo-interface pact tests

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - demo-interface/**
              - demo-service/**
              - docker/**
              - .github/scripts/pact-*.sh
              - .github/workflows/pact-interface.yml

  pact-interface:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Start Pact Broker
        run: docker compose -f docker/docker-compose/run-pact-broker.yml up -d

      - name: Wait for Pact Broker to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:9292 && break
            echo "Waiting for broker... ($i)"
            sleep 2
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: demo-interface/package-lock.json

      - name: Configure Pact Broker main branches
        run: bash .github/scripts/pact-configure-broker.sh

      - name: Bootstrap master branch demo-interface contracts in Pact Broker
        if: github.ref_name != 'master'
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: bash .github/scripts/pact-bootstrap-interface-master.sh

      - name: Install FE dependencies
        working-directory: demo-interface
        run: npm ci

      - name: Run demo-interface consumer pact tests
        working-directory: demo-interface
        run: npm run test:pact

      - name: Publish demo-interface pacts to broker
        working-directory: demo-interface
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_CONSUMER_VERSION: ${{ github.sha }}
          PACT_BRANCH: ${{ github.ref_name }}
        run: npm run pact:publish

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run task API provider pact verification
        working-directory: demo-service
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          PACT_BROKER_BASE_URL: http://localhost:9292
        run: >-
          mvn verify -Pintegration-tests
          -Dit.test="CreateTaskPactProviderTest,DeleteTaskPactProviderTest,GetAllTasksPactProviderTest,GetTaskByIdPactProviderTest,GetIsValidPactProviderTest,UpdateTaskPactProviderTest"
          -Djacoco.skip=true
          -Dpact.verifier.publishResults=true
          -Dpact.provider.version=${{ github.sha }}
          -Dpact.provider.branch=${{ github.ref_name }}
          -Djunit.parallel.enabled=false

      - name: Can I merge to master
        if: github.ref_name != 'master'
        env:
          PACT_VERSION: ${{ github.sha }}
          PACT_MERGE_PROFILE: interface
        run: bash .github/scripts/pact-can-i-merge.sh
