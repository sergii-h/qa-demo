name: Run frontend tests

on:
  push:
    branches:
      - '**'

jobs:
  run-tests:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: demo-interface/package-lock.json

      - name: Install dependencies
        working-directory: demo-interface
        run: npm ci

      - name: Run unit and integration tests
        working-directory: demo-interface
        run: npm test
