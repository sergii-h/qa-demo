name: Run notification-service pact tests

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - notification-service/**
              - demo-service/**
              - docker/**
              - .github/scripts/pact-*.sh
              - .github/workflows/pact-notification.yml

  pact-notification:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start Pact Broker
        uses: ./.github/actions/start-pact-broker
        with:
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Configure Pact Broker main branches
        run: bash .github/scripts/pact-configure-broker.sh

      - name: Bootstrap master branch notification-service contracts in Pact Broker
        if: github.ref_name != 'master'
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: bash .github/scripts/pact-bootstrap-notification-master.sh

      - name: Audit dependencies
        uses: ./.github/actions/audit-osv
        with:
          path: notification-service

      - name: Run notification-service consumer pact tests
        working-directory: notification-service
        run: mvn test

      - name: Publish notification-service pacts to broker
        working-directory: notification-service
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_CONSUMER_VERSION: ${{ github.sha }}
          PACT_BRANCH: ${{ github.ref_name }}
        run: |
          docker run --rm --network=host \
            -v "$PWD/target/pacts:/pacts" \
            -e PACT_BROKER_BASE_URL=${PACT_BROKER_BASE_URL} \
            pactfoundation/pact-cli:latest \
            pact-broker publish /pacts \
            --consumer-app-version ${PACT_CONSUMER_VERSION} \
            --branch ${PACT_BRANCH}

      - name: Run task events provider pact verification
        working-directory: demo-service
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          PACT_BROKER_BASE_URL: http://localhost:9292
        run: >-
          mvn verify -Pintegration-tests
          -Dit.test=TaskEventsPactProviderTest
          -Djacoco.skip=true
          -Dpact.verifier.publishResults=true
          -Dpact.provider.version=${{ github.sha }}
          -Dpact.provider.branch=${{ github.ref_name }}
          -Djunit.parallel.enabled=false

      - name: Can I merge to master
        if: github.ref_name != 'master'
        env:
          PACT_VERSION: ${{ github.sha }}
          PACT_MERGE_PROFILE: notification
        run: bash .github/scripts/pact-can-i-merge.sh
