    - name: set username
      run: COMMIT_USERNAME=sgoldys

    - name: set username
      run: echo "COMMIT_USERNAME=sgoldys" >> "$GITHUB_ENV"

    - name: Push generated allure-results to another repository
      uses: nkoppel/push-files-to-another-repository@v1.1.3
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
      with:
        source-files: 'selenide-selenoid-junit5-example/browsers.json'
        destination-username: 'sgoldys'
        destination-repository: 'github-pages-allure-selenide'
        destination-directory: 'allure-results'
        commit-email: '32680292+sgoldys@users.noreply.github.com'
        commit-username: 'sgoldys'
