name: Run e2e tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  run-tests:
    runs-on: ubuntu-20.04
    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27018:27017

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '18'
        distribution: adopt
        cache: maven

    - name: start application under test
      run: docker compose -f docker/docker-compose-run-application-remote.yml up -d
      
    - name: Pull chrome image
      run: docker compose -f docker/docker-compose-run-selenoid.yml pull chrome

    - name: Start Selenoid
      run: docker compose -f docker/docker-compose-run-selenoid.yml up -d qa-demo-selenoid
       
    - name: Run e2e tests
      run: mvn -Dtest.env=remote test
