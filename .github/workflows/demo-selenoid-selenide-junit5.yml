name: Run e2e tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  run-tests:
    runs-on: ubuntu-20.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '18'
        distribution: adopt
        cache: maven

    - name: Create network
      run: docker network create qa-demo-network

    - name: Start application under test
      run: docker compose -f docker/docker-compose-run-application.yml up -d

    - name: debug
      run: docker logs qa-demo-service

    - name: debug
      run: curl http://localhost:8080/v1/items

