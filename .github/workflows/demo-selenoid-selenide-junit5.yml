name: demo-selenoid-junit5 CI (maven)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '18'
        distribution: adopt
        cache: maven

    # - name: Create network
    #   run: docker network create qa-demo-network

