name: Publish Selenide Allure report
description: Generate Allure HTML and publish to GitHub Pages on master and pull requests

inputs:
  working-directory:
    description: Maven module directory
    required: true
  destination-dir:
    description: GitHub Pages subdirectory for this report on master
    required: true
  report-title:
    description: Display name used in the PR comment
    required: true

runs:
  using: composite
  steps:
    - name: Resolve publish destination
      id: publish
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "destination=${{ inputs.destination-dir }}" >> "$GITHUB_OUTPUT"
        elif [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "destination=pr/${{ github.event.pull_request.number }}/${{ inputs.destination-dir }}" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Allure
      if: steps.publish.outputs.enabled == 'true'
      shell: bash
      run: |
        curl -L -o allure.deb https://github.com/allure-framework/allure2/releases/download/2.34.0/allure_2.34.0-1_all.deb
        sudo dpkg -i allure.deb

    - name: Generate Allure report
      if: steps.publish.outputs.enabled == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: allure generate target/allure-results --clean -o allure-report

    - name: Deploy Allure report to GitHub Pages
      if: steps.publish.outputs.enabled == 'true'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ github.token }}
        publish_dir: ${{ inputs.working-directory }}/allure-report
        destination_dir: ${{ steps.publish.outputs.destination }}
        keep_files: true

    - name: Comment Allure report link on PR
      if: github.event_name == 'pull_request' && steps.publish.outputs.enabled == 'true'
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-includes: '<!-- allure-report-${{ inputs.destination-dir }} -->'
        body: |
          <!-- allure-report-${{ inputs.destination-dir }} -->
          **${{ inputs.report-title }}** — [View Allure report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ steps.publish.outputs.destination }}/)
