name: Publish Selenide Allure report
description: Generate Allure HTML and publish to GitHub Pages on master

inputs:
  working-directory:
    description: Maven module directory
    required: true
  destination-dir:
    description: GitHub Pages subdirectory for this report
    required: true

runs:
  using: composite
  steps:
    - name: Install Allure
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      shell: bash
      run: |
        curl -L -o allure.deb https://github.com/allure-framework/allure2/releases/download/2.34.0/allure_2.34.0-1_all.deb
        sudo dpkg -i allure.deb

    - name: Generate Allure report
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: allure generate target/allure-results --clean -o allure-report

    - name: Deploy Allure report to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ github.token }}
        publish_dir: ${{ inputs.working-directory }}/allure-report
        destination_dir: ${{ inputs.destination-dir }}
        keep_files: true
