name: Publish Selenide Allure report
description: Generate Allure HTML and publish to GitHub Pages on master

inputs:
  working-directory:
    description: Maven module directory
    required: true
  destination-dir:
    description: GitHub Pages subdirectory for this report
    required: true

runs:
  using: composite
  steps:
    - name: Generate Allure report
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: mvn -q allure:report

    - name: Deploy Allure report to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ github.token }}
        publish_dir: ${{ inputs.working-directory }}/target/site/allure-maven-plugin
        destination_dir: ${{ inputs.destination-dir }}
        keep_files: true
