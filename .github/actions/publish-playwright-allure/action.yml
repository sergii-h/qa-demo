name: Publish Playwright Allure report
description: Generate Allure HTML and publish to GitHub Pages on master

inputs:
  working-directory:
    description: Playwright project directory
    required: true
  destination-dir:
    description: GitHub Pages subdirectory for this report
    required: true
  publish-landing-page:
    description: Publish the reports landing page to the site root
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install Allure
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      shell: bash
      run: |
        curl -L -o allure.deb https://github.com/allure-framework/allure2/releases/download/2.34.0/allure_2.34.0-1_all.deb
        sudo dpkg -i allure.deb

    - name: Generate Allure report
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: allure generate allure-results --clean -o allure-report

    - name: Deploy Allure report to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ github.token }}
        publish_dir: ${{ inputs.working-directory }}/allure-report
        destination_dir: ${{ inputs.destination-dir }}
        keep_files: true

    - name: Deploy reports landing page
      if: >-
        github.event_name == 'push' &&
        github.ref == 'refs/heads/master' &&
        inputs.publish-landing-page == 'true'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ github.token }}
        publish_dir: .github/allure-pages
        keep_files: true
