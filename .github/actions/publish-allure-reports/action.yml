name: Publish all E2E test reports
description: Generate Allure HTML and publish Allure and Playwright reports to GitHub Pages in a single push

inputs:
  trigger-event:
    description: Event that started the E2E workflows (push or pull_request)
    required: true
  head-sha:
    description: Commit SHA to collect workflow artifacts from
    required: true
  pr-number:
    description: Pull request number for PR comments and destination path
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Resolve publish destination
      id: publish
      shell: bash
      env:
        TRIGGER_EVENT: ${{ inputs.trigger-event }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        if [ "$TRIGGER_EVENT" = "push" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "destination=" >> "$GITHUB_OUTPUT"
          echo "pages-base=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
        elif [ "$TRIGGER_EVENT" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "destination=pr/${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pages-base=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr/${PR_NUMBER}" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Allure
      if: steps.publish.outputs.enabled == 'true'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y default-jre-headless
        curl -L -o allure.deb https://github.com/allure-framework/allure2/releases/download/2.34.0/allure_2.34.0-1_all.deb
        sudo dpkg -i allure.deb

    - name: Prepare reports for GitHub Pages
      id: generate
      if: steps.publish.outputs.enabled == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PAGES_BASE: ${{ steps.publish.outputs.pages-base }}
        HEAD_SHA: ${{ inputs.head-sha }}
        TRIGGER_EVENT: ${{ inputs.trigger-event }}
      run: |
        set -euo pipefail
        staging="allure-pages-staging"
        rm -rf "$staging"
        mkdir -p "$staging"

        if [ "$TRIGGER_EVENT" = "pull_request" ]; then
          cp .github/allure-pages/index.html "$staging/index.html"
          cp .github/allure-pages/styles.css "$staging/styles.css"
          cp .github/allure-pages/reports.js "$staging/reports.js"
          cp -R .github/allure-pages/assets "$staging/assets"
        fi

        mapfile -t RUN_IDS < <(gh api \
          "repos/${{ github.repository }}/actions/runs?head_sha=${HEAD_SHA}&event=${TRIGGER_EVENT}&per_page=100" \
          --jq '.workflow_runs[] | select(.name == "E2E tests" or .name == "Android E2E tests") | .id')

        download_artifact() {
          local artifact="$1"
          local destination="$2"
          for run_id in "${RUN_IDS[@]}"; do
            if gh run download "$run_id" -n "$artifact" -D "$destination" 2>/dev/null; then
              return 0
            fi
          done
          return 1
        }

        allure_reports=(
          "allure-results-playwright-e2e|playwright-e2e"
          "allure-results-playwright-uat|playwright-uat"
          "allure-results-playwright-accessibility|playwright-accessibility"
          "allure-results-playwright-python-e2e|playwright-python-e2e"
          "allure-results-playwright-python-uat|playwright-python-uat"
          "allure-results-playwright-python-accessibility|playwright-python-accessibility"
          "allure-results-selenide-e2e|selenide-e2e"
          "allure-results-selenide-uat|selenide-uat"
          "allure-results-selenide-accessibility|selenide-accessibility"
          "allure-results-android-e2e|android-compose-e2e"
          "allure-results-android-uat|android-compose-uat"
          "allure-results-android-accessibility|android-compose-accessibility"
        )

        for report in "${allure_reports[@]}"; do
          IFS='|' read -r artifact destination <<< "$report"
          workdir="${RUNNER_TEMP}/allure-${destination}"
          rm -rf "$workdir"
          mkdir -p "$workdir/results"

          if ! download_artifact "$artifact" "$workdir/results"; then
            echo "No Allure results for ${destination} (${artifact}); skipping."
            continue
          fi

          allure generate "$workdir/results" --clean -o "$staging/$destination"
        done

        playwright_reports=(
          "playwright-report-e2e|playwright-html-e2e"
          "playwright-report-uat|playwright-html-uat"
          "playwright-report-accessibility|playwright-html-accessibility"
        )

        for report in "${playwright_reports[@]}"; do
          IFS='|' read -r artifact destination <<< "$report"
          rm -rf "$staging/$destination"

          if ! download_artifact "$artifact" "$staging/$destination"; then
            echo "No Playwright HTML report for ${destination} (${artifact}); skipping."
            continue
          fi
        done

        if [ -z "$(find "$staging" -mindepth 1 -print -quit)" ]; then
          echo "No report artifacts were available to publish."
          echo "published=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "published=true" >> "$GITHUB_OUTPUT"
        echo "pages-url=${PAGES_BASE}/" >> "$GITHUB_OUTPUT"

    - name: Deploy test reports to GitHub Pages
      if: steps.publish.outputs.enabled == 'true' && steps.generate.outputs.published == 'true'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ github.token }}
        publish_dir: allure-pages-staging
        destination_dir: ${{ steps.publish.outputs.destination }}
        keep_files: true

    - name: Comment test report link on PR
      if: inputs.trigger-event == 'pull_request' && inputs.pr-number != '' && steps.publish.outputs.enabled == 'true' && steps.generate.outputs.published == 'true'
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ inputs.pr-number }}
        body-includes: '<!-- allure-reports -->'
        body: |
          <!-- allure-reports -->
          **Test reports** — [View Allure and Playwright reports](${{ steps.generate.outputs.pages-url }})
