name: Audit Gradle dependencies
description: Fail when known high or critical vulnerabilities are found in Gradle dependencies

inputs:
  path:
    description: Gradle project directory to scan
    required: true

runs:
  using: composite
  steps:
    - name: Scan Gradle dependencies
      uses: google/osv-scanner-action/osv-scanner-action@v2
      with:
        scan-args: |-
          -r
          --skip-git
          --min-severity=HIGH
          ${{ inputs.path }}
