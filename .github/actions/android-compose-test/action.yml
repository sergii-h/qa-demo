name: Run Android Compose tests
description: Run instrumented Compose E2E tests and upload Allure results

inputs:
  gradle-args:
    description: Gradle arguments passed to connectedDebugAndroidTest
    required: true
  test-label:
    description: Label for the Gradle test step
    required: true
  artifact-name:
    description: Artifact name for raw Allure results
    required: true

runs:
  using: composite
  steps:
    - name: ${{ inputs.test-label }}
      if: ${{ !cancelled() }}
      continue-on-error: true
      id: test
      shell: bash
      working-directory: demo-android
      run: ./gradlew connectedDebugAndroidTest ${{ inputs.gradle-args }}

    - name: Upload allure results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: demo-android/app/build/allure-results
        retention-days: 7
        if-no-files-found: warn

    - name: Fail job when tests failed
      if: steps.test.outcome == 'failure'
      shell: bash
      run: exit 1
