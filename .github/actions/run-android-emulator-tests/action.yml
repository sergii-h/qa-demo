name: Run Android emulator instrumented tests
description: Enable KVM, configure the Android SDK, and run connectedDebugAndroidTest on an emulator

inputs:
  gradle-args:
    description: Arguments passed to connectedDebugAndroidTest
    required: true

runs:
  using: composite
  steps:
    - name: Enable KVM
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - uses: gradle/actions/setup-gradle@v4

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: platform-tools platforms;android-35 build-tools;35.0.0

    - name: Run instrumented tests on emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        disable-animations: true
        emulator-boot-timeout: 900
        working-directory: demo-android
        script: ./gradlew connectedDebugAndroidTest ${{ inputs.gradle-args }}
