#test-run
test.env=local
test.tags=
test.ignore.tags=uat
test.include=
test.exclude=
test.parallel=false

#test.env=local
local.test.url=http://localhost:5173
local.test.be.url=http://localhost:8080/v1
local.test.wiremock.url=http://localhost:8085

#test.env=docker
docker.test.url=http://qa-demo-interface:5173
docker.test.be.url=http://qa-demo-service:8080/v1
docker.test.remote.webdriver.url=http://qa-demo-selenium-hub:4444/wd/hub
docker.test.wiremock.url=http://qa-demo-wiremock:8080

#test.env=remote
remote.test.url=http://172.17.0.1:5173
remote.test.be.url=http://localhost:8080/v1
remote.test.remote.webdriver.url=http://localhost:4444
remote.test.wiremock.url=http://localhost:8085

# browser
test.desktop.browser-size=1920,1080

test.mobile.browser-height=812
test.mobile.browser-width=375
test.mobile.user-agent=Mozilla/5.0 (iPhone; CPU iPhone OS 12_2 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/15E148

# timeouts (seconds)
test.timeout.selenide.default=10
