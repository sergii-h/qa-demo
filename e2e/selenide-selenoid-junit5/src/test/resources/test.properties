#test.env=local
local.test.url=http://localhost:3000
local.test.be.url=http://localhost:8080/v1
local.test.wiremock.url=http://localhost:8085

#test.env=docker
docker.test.url=http://host.docker.internal:3000
docker.test.be.url=http://host.docker.internal:8080/v1
docker.test.remote.webdriver.url=http://host.docker.internal:4444/wd/hub
docker.test.wiremock.url=http://host.docker.internal:8085

#test.env=remote
remote.test.url=http://172.17.0.1:3000
remote.test.be.url=http://localhost:8080/v1
remote.test.remote.webdriver.url=http://localhost:4444/wd/hub
remote.test.wiremock.url=http://localhost:8085

# browser
test.desktop.browser-size=1920,1080

test.mobile.browser-height=812
test.mobile.browser-width=375
test.mobile.user-agent=Mozilla/5.0 (iPhone; CPU iPhone OS 12_2 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/15E148

